<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Programming IDE</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }
        #content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #editor {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #f5f5f5;
            padding: 10px;
            box-sizing: border-box;
        }
        #terminal {
            height: 200px;
            background-color: #222;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Navigation</h2>
    <!-- Navigation items will be dynamically loaded here -->
    <ul>
        <li><a href="#">File 1</a></li>
        <li><a href="#">File 2</a></li>
        <li><a href="#">File 3</a></li>
    </ul>
</div>

<div id="content">
    <textarea id="editor" placeholder="Open a file to start coding..."></textarea>
    <div id="terminal">
        <p>Terminal/Chat will appear here...</p>
    </div>
</div>

<script src="./renderer.js"></script>
</body>
</html>
