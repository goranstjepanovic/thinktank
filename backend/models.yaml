defaults:
  temperature: 0.2
  max_tokens: null
  format: "json"
  supports_tools: false

quantization:
  # Reference config — NOT auto-applied. Set exact quantized model names in each
  # stage below (e.g. "qwen3.6:27b-q4_K_M") after pulling that variant with Ollama.
  # llamacpp and openvino set quantization externally (GGUF file / optimum export).
  #
  # Common Ollama quant levels (smallest → largest VRAM):
  #   q3_K_M  — aggressive; good for 27B–30B on 16 GB VRAM
  #   q4_0    — fast, slight quality loss
  #   q4_K_M  — balanced Q4 (recommended default for 14B+)
  #   q5_K_M  — better quality, more VRAM
  #   q8_0    — near-lossless; requires nearly full FP16 VRAM
  #
  # To switch quant level for qwen3.6:27b: update the tag in the fallback_models
  # lists and re-pull, e.g.: ollama pull qwen3.6:27b-q4_K_M
  large_model_min_b: 14
  large_model_quant: "q4_K_M"

backends:
  ollama:
    base_url: "http://localhost:11434"
    timeout_seconds: 120
  llamacpp:
    base_url: "http://localhost:8080"
    timeout_seconds: 120
  openvino:
    # Intel OpenVINO GenAI — targets Intel NPU / iGPU / CPU (not NVIDIA).
    # Install: pip install openvino-genai optimum[openvino]
    # Convert a model: optimum-cli export openvino --model <hf-model-id> --weight-format int4_mixed <model_dir>/<name>
    #
    # device options:
    #   NPU              — Intel AI Boost NPU (INT4 models ≤7B, power-efficient)
    #   GPU              — Intel Arc integrated GPU (Arc Xe-LPG on Core Ultra 200)
    #   CPU              — Always available; slower but no memory limits
    #   AUTO:NPU,GPU,CPU — Tries each in order; recommended default
    model_dir: "C:/models/openvino"
    device: "AUTO:NPU,GPU,CPU"
    timeout_seconds: 300  # first call includes model-load time (can be 30-120s)

stages:
  intake:
    model: "qwen2.5:7b"
    backend: "ollama"
    temperature: 0.1
    max_tokens: 1024

  feasibility_scan:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 2048

  solution_design:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.4
    max_tokens: 4096

  solution_analysis:
    model: "qwen2.5:7b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 3072
    num_ctx: 16384
    supports_tools: true

  decomposition:
    model: "qwen2.5:7b"
    backend: "ollama"
    temperature: 0.15
    max_tokens: 4096
    num_ctx: 16384
    supports_tools: false

  component_validator:
    model: "qwen2.5:7b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 2048
    num_ctx: 16384
    supports_tools: true

  deep_review:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 3072
    num_ctx: 16384
    supports_tools: true

  documentation:
    model: "qwen2.5:7b"
    backend: "ollama"
    temperature: 0.3
    max_tokens: 8192

  failure_analysis:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 2048

  approach_generation:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.5
    max_tokens: 1024

  phase2_conversation:
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.4
    max_tokens: 4096
    format: ""          # free-form markdown; OllamaDriver omits format field
    num_ctx: 32768      # large window to hold full conversation + docs context

  phase3_plan:  # Phase 3 pass 0 — JSON file manifest (paths + descriptions only)
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 2048
    format: "json"
    num_ctx: 32768
    supports_tools: true

  phase3_prd:  # Phase 3 — docs/PRD.md generation (all context → comprehensive Markdown PRD)
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.3
    max_tokens: 4096
    format: ""           # free-form Markdown
    num_ctx: 32768
    supports_tools: false

  phase3_file:  # Phase 3 pass 1-N — single file content generation (plain text)
    model: "qwen2.5-coder:14b"
    fallback_models:
      - "qwen3-coder:30b"
      - "codestral:22b"
      - "gemma4:latest"
    backend: "ollama"
    temperature: 0.3
    max_tokens: 8192
    format: ""            # free-form — output written directly to disk
    num_ctx: 32768
    supports_tools: false

  phase3_iteration:  # Phase 3 iteration — plan which files to change given user request
    model: "phi4:14b"
    backend: "ollama"
    temperature: 0.3
    max_tokens: 2048
    format: "json"
    num_ctx: 65536
    supports_tools: false

  phase3_explore:  # Phase 3 iteration planning with file exploration tools
    model: "gemma4:latest"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 2048
    format: "json"
    num_ctx: 32768
    supports_tools: true

  phase3_orchestrator:  # Multi-agent mode — planner that reads PRD and delegates tasks
    model: "qwen3-8b"
    backend: "openvino"
    device: "AUTO:CPU"  # NPU compiler (vpux) fails on Qwen3-8B; skip it
    temperature: 0.2
    max_tokens: 4096
    format: "json"
    num_ctx: 32768      # ignored by OpenVINO (uses model's compiled max)
    supports_tools: true
    timeout_seconds: 900
    think: false

  phase3_verification:  # PRD compliance verification pass — needs deeper reasoning
    model: "qwen3.5:9b"
    backend: "ollama"
    temperature: 0.6
    max_tokens: 4096
    format: "json"
    num_ctx: 16384
    supports_tools: true
    timeout_seconds: 900
    think: false

  phase3_sub_agent:  # Multi-agent mode — executor that writes files and runs commands
    # Orchestrator picks one of these per task; first entry is the default when no model is specified
    selectable_models:
      - name: "fast"
        model: "ducquoc/gemma4-fast-sonnet"
        description: "Config files, simple single-file edits, boilerplate — ≤2 files, no complex logic"
      - name: "standard"
        model: "qwen2.5-coder:7b"
        description: "Most implementation tasks — multi-file modules, straightforward logic"
      - name: "large"
        model: "deepseek-coder-v2:16b"
        description: "Complex algorithms, intricate cross-file wiring, large refactors"
    fallback_models:  # error-recovery fallbacks tried in order when the selected model fails
      - "qwen3.5:9B"
      - "mrthp/omnicoder2"
      - "gemma4:latest"
      - "qwen3-coder:30b"
    backend: "ollama"
    temperature: 0.3
    max_tokens: null
    format: "json"
    num_ctx: 16384
    supports_tools: true
    timeout_seconds: 1200

  context_summarizer:  # Internal — called when a sub-agent's context hits 75% of num_ctx
    model: "ducquoc/gemma4-fast-sonnet"
    backend: "ollama"
    temperature: 0.1
    max_tokens: 400     # summaries must be concise
    format: ""          # plain text
    num_ctx: 4096       # input is compact formatted history, not raw JSON
    supports_tools: false

  phase3_task_verify:  # Per-task verification pass — reads files written by sub-agent, checks for stubs/broken imports
    model: "qwen2.5-coder-3b-instruct"  # int4_mixed — NPU-capable; pull: see openvino backend comment above
    backend: "openvino"
    # device not set — inherits AUTO:NPU,GPU,CPU from backend default (NPU works for this model)
    temperature: 0.1
    max_tokens: 1024
    format: "json"
    num_ctx: 8192
    supports_tools: true
    timeout_seconds: 180

resources:
  max_concurrent_branches: 4
  initial_branches_per_idea: 2
  max_branches_per_idea: 10
  max_parallel_sub_agents: 1
  # Max verify→fix cycles per task. 0 disables task-level verification entirely.
  max_verify_fix_cycles: 3
